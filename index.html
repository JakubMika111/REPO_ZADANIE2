<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorium 6 - Artykuły</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-900 min-h-screen flex flex-col justify-between">

    <main class="max-w-4xl mx-auto px-4 py-8 w-full">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">Portal Artykułów</h1>
            <p class="text-gray-600">Laboratorium 6 - Technologie Webowe</p>
        </header>

        <section class="mb-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b-2 border-indigo-200 pb-2">Lista Artykułów</h2>
            
            <div id="articles-container" class="space-y-6">
                <p class="text-gray-500 italic animate-pulse">Ładowanie artykułów...</p>
            </div>
        </section>

        <section class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">Dodaj nowy artykuł</h2>
            
            <form id="add-article-form" class="space-y-4">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Tytuł (title)</label>
                    <input type="text" id="title" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label for="subtitle" class="block text-sm font-medium text-gray-700 mb-1">Podtytuł (subtitle)</label>
                    <input type="text" id="subtitle" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label for="author" class="block text-sm font-medium text-gray-700 mb-1">Autor (author)</label>
                    <input type="text" id="author" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>

                <div>
                    <label for="content" class="block text-sm font-medium text-gray-700 mb-1">Treść (content)</label>
                    <textarea id="content" rows="5" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>

                <button type="submit" 
                    class="w-full bg-indigo-600 text-white font-medium py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transition-colors">
                    Utwórz artykuł
                </button>
            </form>
        </section>
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 text-sm mt-auto">
        &copy; 2026 Projekt Supabase - GitHub Pages
    </footer>

    <script src="src/main.js"></script>
</body>
</html>
