<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>projektJM</title>
  </head>
  <body class="p-10 font-sans">
    <h1 class="text-2xl font-bold text-primary">Kalkulator Urodzin</h1>

    <form id="birthdayForm" class="mt-8 space-y-4">
      <div>
        <label class="block mb-2">Wybierz datę urodzenia:</label>
        <input type="date" id="birthDate" required class="border p-2 rounded shadow-sm">
      </div>
      
      <button type="submit" class="bg-blue-300 p-4 rounded-lg hover:bg-blue-400 transition-colors">
        Wyślij
      </button>
    </form>

    <dialog id="resultDialog" class="bg-gray-200 p-10 rounded-lg shadow-2xl relative border-none">
      <button id="closeDialog" class="absolute top-2 right-4 text-2xl font-bold hover:text-gray-600">×</button>
      
      <div id="dialogContent" class="text-red-600 text-lg font-medium leading-relaxed">
        </div>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
